    <style>
      #tilo-splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        background: #f5ede2;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        opacity: 1;
        transition: opacity 600ms ease;
      }
      #tilo-splash .tilo-splash-img {
        max-width: min(92vw, 520px);
        max-height: 92vh;
        width: auto;
        height: auto;
        object-fit: contain;
        animation: tiloSplashIn 900ms cubic-bezier(.22,1.2,.36,1) both;
        will-change: transform, opacity;
      }
      #tilo-splash.tilo-splash-hide {
        opacity: 0;
        pointer-events: none;
      }
      #tilo-splash.tilo-splash-hide .tilo-splash-img {
        animation: tiloSplashOut 700ms cubic-bezier(.6,0,.4,1) forwards;
      }
      @keyframes tiloSplashIn {
        0%   { opacity: 0; transform: scale(.85) translateY(20px); }
        60%  { opacity: 1; transform: scale(1.03) translateY(-4px); }
        100% { opacity: 1; transform: scale(1) translateY(0); }
      }
      @keyframes tiloSplashOut {
        0%   { transform: scale(1); opacity: 1; filter: blur(0); }
        100% { transform: scale(1.18) translateY(-10px); opacity: 0; filter: blur(4px); }
      }
      @media (prefers-reduced-motion: reduce) {
        #tilo-splash .tilo-splash-img,
        #tilo-splash.tilo-splash-hide .tilo-splash-img { animation: none; }
      }
    </style>
  </head>

  <body>
    <div id="tilo-splash" aria-hidden="true">
      <img src="/tilo-splash.png" alt="" class="tilo-splash-img" />
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
